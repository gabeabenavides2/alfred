services:
  postgres:
    image: postgres:16
    container_name: alfred-postgres
    restart: always
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - alfred_postgres_data:/var/lib/postgresql/data

volumes:
  alfred_postgres_data:
